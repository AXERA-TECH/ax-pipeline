name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chip: ax650
            script: ./build_ax650.sh
          - chip: ax630c
            script: ./build_ax630c.sh
          - chip: ax620q
            script: ./build_ax620q.sh
          - chip: ax620qp
            script: ./build_ax620qp.sh
          - chip: axcl-x86_64
            script: ./build_axcl_x86.sh
          - chip: axcl-aarch64
            script: ./build_axcl_aarch64.sh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build (${{ matrix.chip }})
        run: |
          chmod +x ./build_ax650.sh ./build_ax630c.sh ./build_ax620q.sh ./build_ax620qp.sh ./build_axcl_x86.sh ./build_axcl_aarch64.sh ./scripts/build_common.sh
          ${{ matrix.script }}

      - name: Upload Artifacts (${{ matrix.chip }})
        uses: actions/upload-artifact@v4
        with:
          name: ax-pipeline-${{ matrix.chip }}
          path: artifacts/${{ matrix.chip }}/*.tar.gz

